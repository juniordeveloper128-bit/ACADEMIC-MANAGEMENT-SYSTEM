<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Results Management System</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        background: white;
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        text-align: center;
        max-width: 500px;
        width: 90%;
    }

    h1 {
        color: #333;
        margin-bottom: 1rem;
        font-size: 2.2rem;
        font-weight: 600;
    }

    .subtitle {
        color: #666;
        margin-bottom: 2rem;
        font-size: 1.1rem;
    }

    .btn-group {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .btn {
        padding: 1rem 2rem;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }

    .btn-secondary {
        background: #f8f9fa;
        color: #333;
        border: 2px solid #e9ecef;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .features {
        margin-top: 2rem;
        text-align: left;
    }

    .feature {
        display: flex;
        align-items: center;
        margin-bottom: 0.5rem;
        color: #666;
    }

    .feature::before {
        content: "✓";
        color: #28a745;
        font-weight: bold;
        margin-right: 0.5rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Academic Results Management</h1>
  <p class="subtitle">Streamline student grade management and results processing</p>

  <div class="btn-group">
    <a href="/login" class="btn btn-primary">Login</a>
    <a href="/signup" class="btn btn-secondary">Sign Up</a>
  </div>

  <div class="features">
    <div class="feature">Teacher grade submission</div>
    <div class="feature">Academic master result management</div>
    <div class="feature">Automated performance ranking</div>
    <div class="feature">Multiple class result generation</div>
  </div>
</div>
</body>
</html>
